<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Hand Strings</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
#container { position: relative; width: 100vw; height: 100vh; }
video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#status {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: rgba(255,255,255,0.7); font-family: sans-serif; font-size: 16px;
  text-align: center; pointer-events: none; letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(150,100,255,0.8);
}
#hint {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.25); font-family: sans-serif; font-size: 12px;
  pointer-events: none; letter-spacing: 0.08em;
}
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">loading hand tracking...</div>
  <div id="hint">show both hands to the camera</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// 10 points per hand:
// 0=wrist, 2=thumb mcp, 4=thumb tip, 5=index mcp, 8=index tip,
// 9=middle mcp, 12=middle tip, 13=ring mcp, 16=ring tip, 20=pinky tip
const LANDMARK_IDS = [0, 2, 4, 5, 8, 9, 12, 13, 16, 20];

const stringState = {};
function getOrCreate(key, h) {
  if (!stringState[key])
    stringState[key] = {hue: h, hueSpeed: 0.35+Math.random()*0.75, vib: 0, prevDist: 0};
  return stringState[key];
}

let t = 0;

function drawBand(x1,y1,x2,y2,state) {
  const dist = Math.hypot(x2-x1,y2-y1)||1;
  const delta = dist - state.prevDist;
  if(Math.abs(delta)>1.5) state.vib = Math.min(Math.abs(delta)*0.45,12);
  state.prevDist = dist;
  state.vib *= 0.84;
  state.hue = (state.hue + state.hueSpeed) % 360;

  const h=state.hue, h2=(state.hue+60)%360, h3=(state.hue+120)%360;
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const nx=-(y2-y1)/dist, ny=(x2-x1)/dist;
  const cx=mx+nx*state.vib*Math.sin(t*20);
  const cy=my+ny*state.vib*Math.sin(t*20);

  const g = ctx.createLinearGradient(x1,y1,x2,y2);
  g.addColorStop(0,  `hsl(${h},100%,68%)`);
  g.addColorStop(0.5,`hsl(${h2},100%,85%)`);
  g.addColorStop(1,  `hsl(${h3},100%,68%)`);

  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(cx,cy,x2,y2);
  ctx.strokeStyle=`hsla(${h2},100%,70%,0.07)`; ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();

  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(cx,cy,x2,y2);
  ctx.strokeStyle=g; ctx.lineWidth=0.8; ctx.stroke();
}

function drawDot(x,y,idx) {
  const hue=(idx*23+t*28)%360;
  const pulse=0.85+0.15*Math.sin(t*3+idx);
  ctx.beginPath(); ctx.arc(x,y,13*pulse,0,Math.PI*2);
  ctx.fillStyle=`hsla(${hue},100%,65%,0.09)`; ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,4.5*pulse,0,Math.PI*2);
  ctx.fillStyle=`hsla(${hue},100%,97%,1)`; ctx.fill();
  for(let a=0;a<4;a++){
    const ang=a*Math.PI/2+t+idx*0.5;
    const len=(5.5+2*Math.sin(t*2+a))*pulse;
    ctx.beginPath(); ctx.moveTo(x,y);
    ctx.lineTo(x+Math.cos(ang)*len,y+Math.sin(ang)*len);
    ctx.strokeStyle=`hsla(${hue},100%,90%,0.45)`; ctx.lineWidth=0.7; ctx.stroke();
  }
}

function onResults(results) {
  status.style.display = 'none';
  t += 0.016;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const allPoints = [];

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    results.multiHandLandmarks.forEach((landmarks, handIdx) => {
      LANDMARK_IDS.forEach((id, li) => {
        const lm = landmarks[id];
        allPoints.push({
          x: (1-lm.x)*canvas.width,
          y: lm.y*canvas.height,
          globalIdx: handIdx*10+li
        });
      });
    });

    for(let i=0;i<allPoints.length;i++)
      for(let j=i+1;j<allPoints.length;j++){
        const key=`${allPoints[i].globalIdx}-${allPoints[j].globalIdx}`;
        const baseHue=(allPoints[i].globalIdx*17+allPoints[j].globalIdx*13)%360;
        drawBand(allPoints[i].x,allPoints[i].y,allPoints[j].x,allPoints[j].y,getOrCreate(key,baseHue));
      }

    allPoints.forEach(p=>drawDot(p.x,p.y,p.globalIdx));
  } else {
    status.style.display='block';
    status.textContent='show your hands ✋';
  }
}

const hands = new Hands({locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.6});
hands.onResults(onResults);

navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1280,height:720}})
  .then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      const camera = new Camera(video, {
        onFrame: async () => { await hands.send({image:video}); },
        width:1280, height:720
      });
      camera.start();
    };
  })
  .catch(() => { status.textContent='camera access denied — please allow camera'; });
</script>
</body>
</html>
